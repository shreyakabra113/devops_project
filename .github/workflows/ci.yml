name: CI

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:13
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Fix Rails permission
        run: chmod +x bin/rails

      - name: Install dependencies
        run: bundle install

      - name: Setup database
        env:
           RAILS_ENV: test
        run: bundle exec rails db:prepare

      - name: Run tests
        run: bundle exec rails test

      - name: Build Docker image
        run: docker build -t legal-app .
